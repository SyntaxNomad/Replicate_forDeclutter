name: Push to Replicate

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Cog
        run: |
          curl -L -o cog https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          chmod +x cog
          sudo mv cog /usr/local/bin/cog

      - name: Login to Replicate
        run: echo "${{ secrets.REPLICATE_API_TOKEN }}" | cog login --token-stdin

      - name: Push model
        run: |
          cd replicate
          cog push