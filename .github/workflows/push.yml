name: Push to Replicate

on:
  push:
    branches: [ main ]

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Cog
        run: |
          curl -L -o cog https://github.com/replicate/cog/releases/latest/download/cog_Linux_x86_64
          chmod +x cog
          sudo mv cog /usr/local/bin/cog

      - name: Push model
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          cd replicate
          cog push